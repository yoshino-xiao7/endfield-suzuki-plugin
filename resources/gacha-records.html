<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; margin: 0; padding: 0; width: 700px; background: transparent; }
        .page { background: #1a1d2e; padding: 20px; border-radius: 16px; }

        .header { background: #242840; border-radius: 12px; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; position: relative; overflow: hidden; }
        .header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #06b6d4, #0891b2, #0e7490); }
        .header-left { }
        .header-title { font-size: 18px; font-weight: bold; color: #e8e8f0; }
        .header-count { font-size: 11px; color: #6a6e8a; margin-top: 3px; }
        .header-pool { font-size: 12px; color: #b0b4d0; background: #1a1d2e; padding: 5px 14px; border-radius: 8px; font-weight: bold; }

        .records-list { background: #242840; border-radius: 10px; overflow: hidden; }

        .record-row { display: flex; align-items: center; padding: 8px 16px; border-bottom: 1px solid #2e3250; gap: 12px; }
        .record-row:last-child { border-bottom: none; }

        .record-rarity { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; flex-shrink: 0; }
        .rarity-6 { background: linear-gradient(135deg, #f59e0b, #fbbf24); color: #1a1d2e; }
        .rarity-5 { background: linear-gradient(135deg, #a855f7, #c084fc); color: #fff; }
        .rarity-4 { background: linear-gradient(135deg, #3b82f6, #60a5fa); color: #fff; }
        .rarity-3 { background: #3a3e5a; color: #8a8eaa; }

        .record-name { flex: 1; font-size: 13px; font-weight: 500; }
        .record-name.r6 { color: #fbbf24; }
        .record-name.r5 { color: #c084fc; }
        .record-name.r4 { color: #93c5fd; }
        .record-name.r3 { color: #6a6e8a; }

        .record-pool { font-size: 10px; color: #5a5e7a; width: 65px; text-align: center; }
        .record-time { font-size: 10px; color: #4a4e6a; width: 90px; text-align: right; font-family: 'Consolas', monospace; }

        .record-up { font-size: 10px; width: 48px; text-align: center; font-weight: bold; }
        .up-yes { color: #4ade80; }
        .up-no { color: #f87171; }

        .stats-footer { text-align: center; padding: 14px 0 2px; font-size: 10px; color: #3a3e5a; font-style: italic; }
    </style>
</head>

<body>
    <div class="page">
        <div class="header">
            <div class="header-left">
                <div class="header-title">📜 抽卡记录</div>
                <div class="header-count">共 {{totalCount}} 条，显示最近 {{showCount}} 条</div>
            </div>
            <div class="header-pool">{{poolName}}</div>
        </div>

        <div class="records-list">
            {{each records r}}
            <div class="record-row">
                <div class="record-rarity rarity-{{r.rarity}}">{{r.rarity}}★</div>
                <div class="record-name r{{r.rarity}}">{{r.itemName}}</div>
                <div class="record-pool">{{r.poolName}}</div>
                <div class="record-time">{{r.time}}</div>
                <div class="record-up">
                    {{if r.isUp === true}}<span class="up-yes">✅UP</span>{{/if}}
                    {{if r.isUp === false}}<span class="up-no">❌歪</span>{{/if}}
                </div>
            </div>
            {{/each}}
        </div>

        <div class="stats-footer">Generated by endfield-suzuki-plugin</div>
    </div>
</body>

</html>
